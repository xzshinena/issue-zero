name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r main/requirements.txt

      - name: Run linter
        run: |
          pip install ruff
          ruff check main/

      - name: Build Docker image
        run: docker build -t issue-zero .
      
      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest main/tests/
    
  deploy:
    runs-on: ubuntu-latest
    needs: build            # wait for the build job to pass
    if: github.ref == 'refs/heads/main'  # only on main, not PRs

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          docker build -t issue-zero .
          # push to a registry, deploy to a server, etc.