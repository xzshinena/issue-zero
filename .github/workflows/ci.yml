name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r main/requirements.txt

      - name: Run linter
        run: |
          pip install ruff
          ruff check main/ --exclude main/app/api/routes/postgre.py --exclude main/app/api/routes/responses.py

      - name: Run import check
        working-directory: main
        run: python -c "from app.main import app; print('App imports OK')"

      - name: Build Docker image
        run: docker build -t issue-zero .

      - name: Run tests
        working-directory: main
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pip install pytest
          if [ -d tests ] && [ "$(find tests -name 'test_*.py' | head -1)" ]; then
            pytest tests/
          else
            echo "No tests found — skipping."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          docker build -t issue-zero .
          # push to a registry, deploy to a server, etc.
